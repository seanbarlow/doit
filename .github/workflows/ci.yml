name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff check
        run: ruff check src/ tests/ --exit-zero

      - name: Run ruff format check
        run: ruff format --check src/ tests/ || true

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]"

      - name: Run tests
        run: |
          pytest tests/unit/ tests/integration/ tests/contract/ \
            -v \
            --tb=short \
            --junit-xml=test-results/junit-py${{ matrix.python-version }}.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results/
          retention-days: 14

      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Results (Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY
          if [ -f test-results/junit-py${{ matrix.python-version }}.xml ]; then
            TESTS=$(grep -o 'tests="[0-9]*"' test-results/junit-py${{ matrix.python-version }}.xml | head -1 | grep -o '[0-9]*')
            FAILURES=$(grep -o 'failures="[0-9]*"' test-results/junit-py${{ matrix.python-version }}.xml | head -1 | grep -o '[0-9]*')
            echo "- Total: ${TESTS:-0}, Failures: ${FAILURES:-0}" >> $GITHUB_STEP_SUMMARY
          fi
